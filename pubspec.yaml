name: emergency_alert_app
description: "Community Emergency Alert App — Missing Children, Blood Donation, SOS"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Core UI
  cupertino_icons: ^1.0.8

  # Location (GPS) - REAL GPS
  geolocator: ^13.0.0
  geocoding: ^3.0.0

  # SMS & Phone Calls - REAL SMS
  url_launcher: ^6.3.0

  # Storage - saves contacts permanently
  shared_preferences: ^2.3.2

  # Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true